
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenskeeper Support</title>
    <style>
      body{
        margin:0;
        font-family:'FamiliarPro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at top, rgba(21,195,82,0.14), transparent 40%),
          #ffffff;
        color:#18181b;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        -webkit-font-smoothing:antialiased;
      }

      .card{
        max-width:640px;
        width:90%;
        background:rgba(255,255,255,0.9);
        border:1px solid #e4e4e7;
        border-radius:2rem;
        padding:3rem 2.5rem;
        text-align:center;
        box-shadow:0 20px 50px rgba(21,195,82,0.08);
        backdrop-filter:blur(12px);
      }

      .logo{
        width:44px;
        height:44px;
        border-radius:14px;
        border:1px solid rgba(21,195,82,0.2);
        display:flex;
        align-items:center;
        justify-content:center;
        margin:0 auto 1.2rem;
        font-weight:600;
        letter-spacing:0.18em;
        color:#15c352;
      }

      h1{
        margin:0 0 0.75rem;
        font-size:2rem;
        letter-spacing:-0.03em;
      }

      p{
        margin:0.5rem 0;
        color:#71717a;
        line-height:1.7;
      }

      .email{
        margin-top:1.5rem;
        display:inline-block;
        padding:0.85rem 1.3rem;
        border-radius:999px;
        border:1px solid #e4e4e7;
        background:#fff;
        font-weight:500;
        color:#18181b;
        transition:all .18s ease;
      }

      .email:hover{
        transform:translateY(-1px);
        box-shadow:0 12px 30px rgba(21,195,82,0.08);
      }

      .footer{
        margin-top:2rem;
        font-size:0.9rem;
        color:#9ca3af;
      }
    </style>
  </head>

  <body>

    <div class="card">

      <div class="logo" style="overflow:hidden;">
        <img src="./images/greenskeeper-logo.png" alt="Greenskeeper logo" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'; this.parentNode.innerHTML='GK';" />
      </div>

      <h1>Greenskeeper Support</h1>

      <p>
        Need help with Greenskeeper?
      </p>

      <p>
        Questions, feedback, or bug reports are always welcome.
      </p>

      <a class="email" href="mailto:greenskeeperapp@gmail.com">
        greenskeeperapp@gmail.com
      </a>

      <div class="footer">
        We typically respond within 24–48 hours.
      </div>

    </div>

  </body>
</html>
